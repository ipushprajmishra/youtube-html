<!doctype html>
<html>
  <head>
    <title>Position Practise</title>
  </head>
  <body style="height: 3000px; padding-top: 35px; padding-left: 80px">
    <div
      style="
        position: fixed;
        top: 0;
        left: 0px;
        right: 0;
        height: 30px;
        background-color: black;
        color: white;
      "
    >
      header
    </div>

    <div
      style="
        background-color: green;
        color: white;
        position: fixed;
        left: 0px;
        bottom: 0px;
        top: 30px;
        width: 72px;
      "
    >
      style bar
    </div>

<div style="background-color: red;
position:absolute;
left: 0px;
top:10px;">absolute</div>

    <div
      style="
        position: static;
        background-color: lightblue;
        height: 200px;
        width: 200px;
      "
    >
      div1
    </div>
    <div style="background-color: lightpink; height: 200px; width: 200px">
      div2
    </div>
  </body>
</html>
